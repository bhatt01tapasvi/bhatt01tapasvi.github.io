name: Sync Google Scholar Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-scholar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Pull publications from Google Scholar
        env:
          GOOGLE_SCHOLAR_USER_ID: 6h51W0EAAAAJ
        run: python scripts/sync_scholar.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/google-scholar.json
          if git diff --cached --quiet; then
            echo "No Scholar updates found"
            exit 0
          fi
          git commit -m "chore: sync Google Scholar publications"
          git push
